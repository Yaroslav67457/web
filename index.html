<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат на Python + Flask-SocketIO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .chat-container {
            max-width: 1100px;
            width: 100%;
            height: 85vh;
            background: rgba(22, 32, 42, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: rgba(10, 20, 28, 0.9);
            padding: 1rem 1.8rem;
            border-bottom: 1px solid rgba(72, 187, 255, 0.3);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
            gap: 12px;
        }
        .title {
            color: #b9e6ff;
            font-weight: 700;
            font-size: 1.45rem;
        }
        .title span {
            background: #2c5a7a;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
        }
        .user-panel {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .nick-input {
            background: #1e2f3c;
            border: 1px solid #3f6b88;
            padding: 8px 14px;
            border-radius: 60px;
            color: #eef5ff;
            outline: none;
            width: 150px;
        }
        .btn-set {
            background: #2c6e9e;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .status-badge {
            font-size: 0.8rem;
            background: #1f3e4e;
            padding: 5px 12px;
            border-radius: 30px;
            color: #aad4f5;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 22px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 85%;
            width: fit-content;
            animation: fadeSlide 0.2s ease-out;
        }
        .message-own {
            align-self: flex-end;
        }
        .message-other {
            align-self: flex-start;
        }
        .message-bubble {
            padding: 10px 16px;
            border-radius: 24px;
            background: #1e2f3b;
            color: #eef2f5;
            word-wrap: break-word;
        }
        .message-own .message-bubble {
            background: #1f6390;
            border-bottom-right-radius: 5px;
        }
        .message-other .message-bubble {
            background: #2a3f4c;
            border-bottom-left-radius: 5px;
        }
        .message-meta {
            font-size: 0.7rem;
            margin: 4px 10px 2px 10px;
            display: flex;
            gap: 12px;
            color: #9bb8cf;
        }
        .message-name {
            font-weight: 600;
        }
        .system-message {
            text-align: center;
            font-size: 0.75rem;
            background: rgba(0,0,0,0.4);
            padding: 6px 12px;
            border-radius: 50px;
            width: fit-content;
            margin: 5px auto;
            color: #bcd0df;
            font-style: italic;
        }
        .input-panel {
            background: #0d1a24;
            padding: 16px 22px;
            border-top: 1px solid #2f556b;
            display: flex;
            gap: 12px;
        }
        .message-input {
            flex: 1;
            background: #1f2f3a;
            border: none;
            padding: 14px 20px;
            border-radius: 60px;
            color: white;
            font-size: 1rem;
            outline: none;
            border: 1px solid #3f627b;
        }
        .send-btn {
            background: #2c7cb6;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 60px;
            cursor: pointer;
            color: white;
            font-size: 1.4rem;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <div class="title">💬 Чат на Python <span>Flask-SocketIO</span></div>
        <div class="user-panel">
            <input type="text" id="nickname" class="nick-input" placeholder="Ваш ник" maxlength="24">
            <button id="setNickBtn" class="btn-set">✅ Установить</button>
            <div class="status-badge" id="status">🔄 Соединение...</div>
        </div>
    </div>
    <div class="messages-area" id="messages"></div>
    <div class="input-panel">
        <input type="text" id="messageInput" class="message-input" placeholder="Введите сообщение...">
        <button id="sendBtn" class="send-btn">➤</button>
    </div>
</div>

<script>
    const socket = io();
    let currentNick = '';

    const messagesDiv = document.getElementById('messages');
    const nickInput = document.getElementById('nickname');
    const setNickBtn = document.getElementById('setNickBtn');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusSpan = document.getElementById('status');

    function addSystemMessage(text) {
        const div = document.createElement('div');
        div.className = 'system-message';
        div.textContent = text;
        messagesDiv.appendChild(div);
        scrollToBottom();
    }

    function addMessage(username, text, timestamp, isOwn = false) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${isOwn ? 'message-own' : 'message-other'}`;
        const meta = document.createElement('div');
        meta.className = 'message-meta';
        meta.innerHTML = `<span class="message-name">${escapeHtml(username)}</span><span>${timestamp}</span>`;
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        bubble.textContent = text;
        msgDiv.appendChild(meta);
        msgDiv.appendChild(bubble);
        messagesDiv.appendChild(msgDiv);
        scrollToBottom();
    }

    function scrollToBottom() {
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // --- Socket events ---
    socket.on('connect', () => {
        statusSpan.innerHTML = '🟢 Онлайн';
        statusSpan.style.color = '#b4f0b0';
        addSystemMessage('Соединение с сервером установлено');
    });
    socket.on('disconnect', () => {
        statusSpan.innerHTML = '🔴 Офлайн';
        statusSpan.style.color = '#ffaeae';
        addSystemMessage('Соединение потеряно. Перезагрузите страницу.');
    });
    socket.on('system', (data) => {
        addSystemMessage(data.msg);
    });
    socket.on('new_message', (data) => {
        const isOwn = (data.username === currentNick);
        addMessage(data.username, data.text, data.timestamp, isOwn);
    });
    socket.on('chat_history', (history) => {
        if (history && history.length) {
            history.forEach(msg => {
                const isOwn = (msg.username === currentNick);
                addMessage(msg.username, msg.text, msg.timestamp, isOwn);
            });
            addSystemMessage(`📜 Загружено ${history.length} сообщений`);
        }
    });
    socket.on('nick_success', (data) => {
        currentNick = data.nick;
        nickInput.value = currentNick;
        addSystemMessage(`✅ Ваш ник: ${currentNick}`);
    });
    socket.on('nick_failed', (data) => {
        addSystemMessage(`❌ Ошибка: ${data.reason}`);
    });

    // --- UI handlers ---
    function setNick() {
        let nick = nickInput.value.trim();
        if (!nick) {
            addSystemMessage('Введите никнейм');
            return;
        }
        socket.emit('set_nick', { nick: nick });
    }

    function sendMessage() {
        if (!currentNick) {
            addSystemMessage('Сначала установите никнейм!');
            return;
        }
        const text = messageInput.value.trim();
        if (!text) return;
        socket.emit('send_message', { text: text });
        messageInput.value = '';
        messageInput.focus();
    }

    setNickBtn.addEventListener('click', setNick);
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    nickInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') setNick(); });

    // Загружаем сохранённый ник из localStorage
    const saved = localStorage.getItem('python_chat_nick');
    if (saved) {
        nickInput.value = saved;
        setTimeout(() => setNick(), 500);
    }
    // Сохраняем ник после успеха
    socket.on('nick_success', (data) => {
        localStorage.setItem('python_chat_nick', data.nick);
    });
</script>
</body>
</html>
